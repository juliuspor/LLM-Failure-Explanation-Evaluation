{% extends "base.html" %}
{% block content %}
  <section class="card">
    <h1>Done</h1>
    <p>Thanks — your responses have been saved.</p>
    <h2>Optional short interview prompt</h2>
    <p class="meta">This question is optional. You can leave it blank and still finish the study.</p>
    {% if saved %}
      <p class="note"><strong>Saved.</strong> Thanks for the additional feedback!</p>
    {% endif %}

    <form method="post" action="/t/{{ token }}/done" class="form">
      <div class="field">
        <label for="interview_judging">
          <strong>How did you feel about judging explanations by each criterion?</strong>
          Any case that was particularly challenging, and why?
        </label>
        <textarea id="interview_judging" name="interview_judging" class="textarea" rows="5"
          placeholder="Optional...">{{ interview.get("judging_by_criterion", "") }}</textarea>
      </div>

      <div class="actions">
        <button class="btn" type="submit">Save optional responses</button>
      </div>
    </form>
  </section>
{% endblock %}
