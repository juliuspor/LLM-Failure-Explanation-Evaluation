{% extends "base.html" %}
{% block content %}
<section class="card">
  <h1>Participant Name</h1>
  <p class="meta">
    Please enter your participant ID (or name) so your responses can be attributed correctly.
  </p>
  <form method="post" action="/t/{{ token }}/identify" class="form">
    <div class="field">
      <label for="participant_id"><strong>Participant Name</strong></label>
      <input id="participant_id" name="participant_id" type="text" placeholder="Please use your real name"
        value="{{ existing }}" required />
    </div>
    <div class="actions">
      <button class="btn" type="submit">Continue</button>
    </div>
  </form>
</section>
{% endblock %}
